<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Quiz Anglais</title>
  
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 30px;
    }

    #question {
      font-size: 24px;
      margin-bottom: 20px;
    }

    button {
      display: block;
      margin: 10px auto;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      width: 200px;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .correct {
      background-color: #4CAF50;
      color: white;
    }

    .wrong {
      background-color: #f44336;
      color: white;
    }

    #nextBtn {
      margin-top: 20px;
      display: none;
      background: #333;
      color: white;
    }

    #score {
      margin-top: 20px;
      font-size: 18px;
    }
    
    #feedback {
      margin-top: 15px;
      font-size: 20px;
      font-weight: bold;
      
    }
  </style>
</head>

<body>

<h1>🇬🇧 Quiz d’anglais</h1>

<div id="question"></div>
<div id="reponses"></div>
<div id="feedback"></div>


<div id="score"></div>

<button id="recommencerBtn" style="display:none;">🔁 Recommencer</button>  

<script>

const NOMBRE_QUESTIONS = 10;  
  
const quiz = [
  // FAMILY
  { question: "family", choix: ["famille", "ami", "voisin"], bonneReponse: 0 },
  { question: "parents", choix: ["enfants", "parents", "amis"], bonneReponse: 1 },

  { question: "father", choix: ["frère", "père", "oncle"], bonneReponse: 1 },
  { question: "brother", choix: ["cousin", "frère", "ami"], bonneReponse: 1 },
  { question: "sister", choix: ["sœur", "nièce", "tante"], bonneReponse: 0 },
  { question: "uncle", choix: ["père", "oncle", "grand-père"], bonneReponse: 1 },
  { question: "aunt", choix: ["tante", "sœur", "cousine"], bonneReponse: 0 },
  { question: "cousin", choix: ["ami", "cousin", "voisin"], bonneReponse: 1 },
  { question: "child", choix: ["bébé", "enfant", "adulte"], bonneReponse: 1 },
  { question: "baby", choix: ["bébé", "enfant", "ado"], bonneReponse: 0 },
  { question: "birth", choix: ["mort", "naissance", "fête"], bonneReponse: 1 },
  { question: "wedding", choix: ["anniversaire", "mariage", "soirée"], bonneReponse: 1 },

  // NATIONALITIES
  { question: "British", choix: ["anglais", "britannique", "américain"], bonneReponse: 1 },
  { question: "French", choix: ["français", "italien", "espagnol"], bonneReponse: 0 },
  { question: "American", choix: ["canadien", "américain", "mexicain"], bonneReponse: 1 },
  { question: "Australian", choix: ["australien", "anglais", "néo-zélandais"], bonneReponse: 0 },
  { question: "Indian", choix: ["indien", "chinois", "japonais"], bonneReponse: 0 },

  // ADJECTIVES
  { question: "big", choix: ["grand", "petit", "court"], bonneReponse: 0 },
  { question: "small", choix: ["grand", "petit", "énorme"], bonneReponse: 1 },
  { question: "young", choix: ["vieux", "jeune", "grand"], bonneReponse: 1 },
  { question: "old", choix: ["jeune", "ancien/vieux", "neuf"], bonneReponse: 1 },
  { question: "funny", choix: ["drôle", "triste", "ennuyeux"], bonneReponse: 0 },
  { question: "intelligent", choix: ["bête", "intelligent", "lent"], bonneReponse: 1 },
  { question: "beautiful", choix: ["moche", "beau/belle", "sale"], bonneReponse: 1 },
  { question: "shy", choix: ["timide", "bruyant", "méchant"], bonneReponse: 0 },
  { question: "friendly", choix: ["gentil", "méchant", "froid"], bonneReponse: 0 },
  { question: "selfish", choix: ["généreux", "égoïste", "sympa"], bonneReponse: 1 },

  // CLOTHES
  { question: "t-shirt", choix: ["t-shirt", "pantalon", "pull"], bonneReponse: 0 },
  { question: "jeans", choix: ["jupe", "jean", "short"], bonneReponse: 1 },
  { question: "shoes", choix: ["chaussures", "chaussettes", "chapeau"], bonneReponse: 0 },
  { question: "coat", choix: ["manteau", "veste", "pull"], bonneReponse: 0 },
  { question: "hat", choix: ["casquette", "chapeau", "bonnet"], bonneReponse: 1 },

  // BODY
  { question: "head", choix: ["tête", "bras", "main"], bonneReponse: 0 },
  { question: "eyes", choix: ["yeux", "oreilles", "nez"], bonneReponse: 0 },
  { question: "hands", choix: ["mains", "pieds", "bras"], bonneReponse: 0 },
  { question: "legs", choix: ["jambes", "bras", "dos"], bonneReponse: 0 },
  { question: "mouth", choix: ["nez", "bouche", "oreille"], bonneReponse: 1 },

  // JOBS
  { question: "teacher", choix: ["professeur", "docteur", "policier"], bonneReponse: 0 },
  { question: "doctor", choix: ["infirmier", "médecin", "dentiste"], bonneReponse: 1 },
  { question: "pilot", choix: ["pilote", "chauffeur", "mécanicien"], bonneReponse: 0 },
  { question: "baker", choix: ["boucher", "boulanger", "chef"], bonneReponse: 1 },
  { question: "farmer", choix: ["fermier", "ouvrier", "vendeur"], bonneReponse: 0 },

  // ANIMALS
  { question: "dog", choix: ["chat", "chien", "lapin"], bonneReponse: 1 },
  { question: "cat", choix: ["chien", "chat", "souris"], bonneReponse: 1 },
  { question: "rabbit", choix: ["lapin", "hamster", "rat"], bonneReponse: 0 },
  { question: "lion", choix: ["tigre", "lion", "zèbre"], bonneReponse: 1 },
  { question: "tiger", choix: ["lion", "tigre", "léopard"], bonneReponse: 1 },

  // DAILY ROUTINE
  { question: "to sleep", choix: ["manger", "dormir", "courir"], bonneReponse: 1 },
  { question: "to eat", choix: ["boire", "manger", "jouer"], bonneReponse: 1 },
  { question: "to go to school", choix: ["aller à l’école", "dormir", "travailler"], bonneReponse: 0 },
  { question: "to read", choix: ["écrire", "lire", "écouter"], bonneReponse: 1 },

  // HOUSE
  { question: "house", choix: ["maison", "porte", "fenêtre"], bonneReponse: 0 },
  { question: "kitchen", choix: ["salon", "chambre", "cuisine"], bonneReponse: 2 },
  { question: "bedroom", choix: ["chambre", "garage", "jardin"], bonneReponse: 0 },
  { question: "garden", choix: ["jardin", "mur", "toit"], bonneReponse: 0 },

  // FOOD
  { question: "meat", choix: ["fruit", "viande", "légume"], bonneReponse: 1 },
  { question: "vegetables", choix: ["légumes", "fruits", "viande"], bonneReponse: 0 },
  { question: "fruit", choix: ["légumes", "fruits", "desserts"], bonneReponse: 1 },
  { question: "cake", choix: ["pain", "gâteau", "fromage"], bonneReponse: 1 },

  // FEELINGS
  { question: "happy", choix: ["triste", "content", "fatigué"], bonneReponse: 1 },
  { question: "sad", choix: ["heureux", "triste", "énervé"], bonneReponse: 1 },
  { question: "angry", choix: ["calme", "énervé", "joyeux"], bonneReponse: 1 },
  { question: "afraid", choix: ["courageux", "effrayé", "content"], bonneReponse: 1 }
];
  
let indexQuestion = 0;
let score = 0;

function melangerTableau(tab){
    for(let i = tab.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [tab[i], tab[j]] = [tab[j], tab[i]];
    }
}
  
melangerTableau(quiz);

// On prend seulement X questions
let quizSelection = quiz.slice(0, NOMBRE_QUESTIONS);
  
function afficherQuestion() {
  const q = quizSelection[indexQuestion];

  document.getElementById("question").textContent = q.question;
  document.getElementById("reponses").innerHTML = "";
  document.getElementById("feedback").textContent = "";

  // 👉 On copie les choix avec leur index
  let choixMelanges = q.choix.map((choix, index) => ({
    texte: choix,
    correct: index === q.bonneReponse
  }));

  // 👉 On mélange
  melangerTableau(choixMelanges);

  // 👉 On affiche
  choixMelanges.forEach((choixObj, index) => {
    const button = document.createElement("button");
    button.textContent = choixObj.texte;

    button.addEventListener("click", () => {
      verifierReponse(index, choixMelanges);
    });

    document.getElementById("reponses").appendChild(button);
  });
}

function verifierReponse(indexChoisi, choixMelanges) {
  const buttons = document.querySelectorAll("#reponses button");

  buttons.forEach((btn, index) => {
    btn.disabled = true;

    if (choixMelanges[index].correct) {
      btn.classList.add("correct");
    } else if (index === indexChoisi) {
      btn.classList.add("wrong");
    }
  });

  if (choixMelanges[indexChoisi].correct) {
    score++;
    document.getElementById("feedback").textContent = "✅ Bonne réponse !";
  } else {
    document.getElementById("feedback").textContent = "❌ Mauvaise réponse !";
  }

  setTimeout(() => {
  indexQuestion++;

  if (indexQuestion < quizSelection.length) {
    afficherQuestion();
  } else {
    afficherScore();
  }
}, 2000); // 2 secondes
}


function afficherScore() {
  document.getElementById("question").textContent = "Quiz terminé !";
  document.getElementById("reponses").innerHTML = "";


  document.getElementById("score").textContent =
    "Score : " + score + " / " + quizSelection.length;

  document.getElementById("recommencerBtn").style.display = "block";
} 


 function afficherQuiz() {
  indexQuestion = 0;
  score = 0;

  // On remélange les questions
  melangerTableau(quiz);
  quizSelection = quiz.slice(0, Math.min(NOMBRE_QUESTIONS, quiz.length));

  document.getElementById("score").textContent = "";
  document.getElementById("recommencerBtn").style.display = "none";

  afficherQuestion();
}

  document
  .getElementById("recommencerBtn")
  .addEventListener("click", afficherQuiz);
  



  
afficherQuestion();
</script>

</body>
</html>
