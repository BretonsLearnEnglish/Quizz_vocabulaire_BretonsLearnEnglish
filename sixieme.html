<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Anglais</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Menu -->
  <div id="menu">
    <h1>🇬🇧 Quiz d’anglais niveau A1 / A1+</h1>
    <button id="startQuizBtn">Démarrer le quiz</button>
  </div>
  
  <!-- Entrer Nom pour classement -->
<input type="text" id="playerName" placeholder="Ton nom">
<select id="niveau">
  <option value="facile">Facile</option>
  <option value="moyen">Moyen</option>
  <option value="difficile">Difficile</option>
</select>
<button id="startQuizBtn">Démarrer</button>
  
  <!-- Quiz -->
  <div class="container" style="display:none;">
    <div id="progress-bar">
      <div id="progress"></div>
    </div>

    <div id="question"></div>
    <div id="reponses"></div>
    <div id="feedback"></div>
    <div id="score"></div>

    <button id="recommencerBtn" style="display:none;">🔁 Recommencer</button>
    <button id="menuBtn">⬅ Retour au menu</button>
  </div>

  <!-- 🎯 BOUTONS NIVEAUX -->
  <div class="levels">
    <a href="index.html"><button>Menu principal</button></a>
    <a href="sixieme.html"><button>6ème</button></a>
    <a href="cinquieme.html"><button>5ème</button></a>
    <a href="quatrieme.html"><button>4ème</button></a>
    <a href="troisieme.html"><button>3ème</button></a>
  </div>
  
  <!-- Les bons scripts dans le bon ordre -->
  <script src="js/sixieme.js"></script>
  <script src="js/script.js"></script>

</body>
</html>
