<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Anglais</title>
  <link rel="stylesheet" href="css/style.css">
  
<!-- Inclure d'abord la base de données, puis le script principal -->
  <script src="js/cinquieme.js"></script> <!-- contient le tableau quiz -->
  <script src="js/script.js"></script>   <!-- contient le code du quiz -->
  
</head>

<body>

  <!-- ====== Menu principal ====== -->
  <div id="menu">
    <h1>🇬🇧 Quiz d’anglais niveau Cinquième</h1>
    <button id="startQuizBtn">Démarrer le quiz</button>
  </div>

  <!-- ====== Quiz ====== -->
  <div class="container" style="display:none;">
    <div id="progress-bar">
      <div id="progress"></div>
    </div>

    <div id="question"></div>
    <div id="reponses"></div>
    <div id="feedback"></div>
    <div id="score"></div>

    <button id="recommencerBtn" style="display:none;">🔁 Recommencer</button>
    <button id="menuBtn">⬅ Retour au menu</button>
  </div>

</body>
</html>
